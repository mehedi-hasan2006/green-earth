<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth || Mehedi Hasan</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

    <!-- Tailwind + Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- Font Awesome icon CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Inter Font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- External CSS File  -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-[#f0fdf4]">



    <!-- Choose Your Trees -->
    <h2 class="text-center font-semibold text-2xl pt-7">Choose Your Trees</h2>

    <div class="grid grid-cols-1 xl:grid-cols-12 gap-5 w-11/12 mx-auto pb-10 pt-5">
        <!-- catagories -->

        <div id="categories" class="col-span-12 xl:col-span-2  border-red-500">
            <h2 class="font-bold text-[24px]">Catagories</h2>

            <button id="allBtn" onclick="allCategoryBtn(allBtn)"
                class="btn btn-success w-full mb-3 categoryBtn">All</button>

            <div id="categoriesContainer" class="space-y-3  grid grid-cols-2 
            sm:grid-cols-3 md:grid-cols-5 xl:grid-cols-1 gap-4">
                <!-- category display here from api -->
            </div>
        </div>

        <!-- item cards -->
        <div class="col-span-12 xl:col-span-8   border-green-500">

            <div id="itemCardsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">



            </div>
        </div>


        <!-- buy card design  -->
        <div class="col-span-12 xl:col-span-2  border-violet-600 bg-white rounded-md p-5">

            <h2 class="font-semibold text-[26px]">Your Cart</h2>

            <!-- cart details  -->
            <div id="cartContainer" class="space-y-4">

                <!-- Cart information display here  -->

            </div>


            <!-- total amount section  -->
            <div id="totalAmount" class="pt-2 hidden">
                <hr class="opacity-50">

                <div class="flex justify-between items-center font-bold ">
                    <p class="pt-1">Total: </p>
                    <p class="pt-1"> ৳ <span id="totalTaka"> </span></p>
                </div>
            </div>

            <!-- no item found  -->
            <div id="cartNoItem" class="hidden flex justify-center">
                <img src="./assets/cart-no-item.png" alt="">
            </div>

        </div>


    </div>


    <!-- JS  -->
    <script src="./js/script.js"></script>
</body>

</html>
